name: gifolomora
description: "Cross-platform glassmorphism GIF editor & maker."
publish_to: 'none'

version: 1.0.2+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.6.3
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Windows in-process FFmpeg (FfmpegDllBackend): dart:ffi struct/Utf8 helpers.
  ffi: ^2.1.3

  # Phase 1: file picking + permissions
  file_picker: ^8.1.2
  permission_handler: ^11.3.1

  # Phase 1: Android FFmpeg backend.
  # VERIFY: check pub.dev for current name/version/API before Android build.
  # If unavailable: remove this line — Windows path works without it.
  ffmpeg_kit_flutter_new: ^4.2.1

  # Phase 2: video playback for video-to-gif trim UI
  # media_kit: Windows-solid (PLAN.md recommendation) + Android via same API
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # Phase 4: Windows custom title bar (desktop-only; guarded with Platform.isWindows)
  window_manager: ^0.3.9

  # Screen Record: monitor enumeration + global hotkeys (Windows-only features,
  # both leanflutter, same org as window_manager)
  screen_retriever: ^0.1.9
  hotkey_manager: ^0.2.3
  # hotkey_manager's own `PhysicalKeyboardKey.keyCode` -> Win32 VK mapping,
  # reused directly by hotkey_service.dart for the WH_KEYBOARD_LL hook.
  uni_platform: ^0.1.3

  # Desktop drag-and-drop file acceptance (Windows/macOS/Linux)
  desktop_drop: ^0.4.4

  image: ^4.0.0

  package_info_plus: ^8.0.0

  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.3.13
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.7

dependency_overrides:
  # Local override: same Dart/Android/iOS code but pluginClass:none for Windows
  # to skip broken Windows native compilation (we use FfmpegProcessBackend on Windows).
  ffmpeg_kit_flutter_new:
    path: ./packages/ffmpeg_kit_flutter_new

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/banner.png
    - assets/banner.gif
    - assets/app.png
    - assets/noise.png
    - assets/fonts/
    - assets/licenses/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app.png"
  windows:
    generate: true
    image_path: "assets/app.png"
    icon_size: 256
  web:
    generate: false
  macos:
    generate: false
  linux:
    generate: false

msix_config:
  display_name: Gifolomora
  publisher_display_name: Takayoshi Code
  # identity_name format: PublisherName.AppName (no spaces, alphanumeric+dots only)
  # Must match the identity registered in Partner Center for Store submission.
  identity_name: TakayoshiCode.Gifolomora
  publisher: CN=Takayoshi Code
  # msix_version must be 4-part (major.minor.patch.build)
  msix_version: 1.0.0.0
  logo_path: assets\app.png
  # icons_background_color: transparent works for logos with alpha channel
  icons_background_color: transparent
  architecture: x64
  languages: en-us
  # runFullTrust: required for Desktop Bridge (Win32) apps.
  # Allows child process spawning (ffmpeg.exe/ffprobe.exe) and broad file system access.
  # Permitted in Microsoft Store for Desktop Bridge / packaged Win32 apps.
  capabilities: 'runFullTrust'
  # For local dev/testing: generate a self-signed cert (see scripts\build_msix_release.ps1).
  # For Store submission: leave certificate_path unset — Partner Center signs the package.
  # certificate_path: path\to\your.pfx
  # certificate_password: yourpassword
  store: false
